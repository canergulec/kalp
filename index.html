<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İhtişamlı Kalp Animasyonu</title>
    <style>
        /* Genel sayfa ayarları ve karanlık, gizemli arka plan */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Arka plandaki parçacıklar için Canvas katmanı */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Kalp ve yaydığı dalgaları bir arada tutan merkez */
        .heart-container {
            position: relative;
            width: 100px;
            height: 100px;
            z-index: 10;
            /* Gerçekçi iki vuruşlu kalp atışı animasyonu */
            animation: heartbeat 1.5s infinite;
            /* Görsel olarak tam merkeze oturtmak için ufak bir ayar */
            margin-top: 20px; 
        }

        /* Kalbin ana şekli (Döndürülmüş bir kare) */
        .heart {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff004f;
            transform: rotate(-45deg);
            /* Yoğun neon parlama efekti */
            box-shadow: 0 0 60px #ff004f, 0 0 120px #ff004f;
        }

        /* Kalbin üst yuvarlak kısımları */
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff004f;
            border-radius: 50%;
            box-shadow: 0 0 60px #ff004f;
        }

        /* Sol yuvarlak */
        .heart::before {
            top: -50px;
            left: 0;
        }

        /* Sağ yuvarlak */
        .heart::after {
            left: 50px;
            top: 0;
        }

        /* Kalpten dışarı doğru yayılan ışık dalgaları */
        .halo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 0, 79, 0.8);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 0, 79, 0.5);
            animation: pulse-ring 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        
        /* Dalgaların peş peşe çıkması için gecikmeler */
        .halo:nth-child(1) { animation-delay: 0s; }
        .halo:nth-child(2) { animation-delay: 0.5s; }
        .halo:nth-child(3) { animation-delay: 1s; }

        /* --- ANİMASYON ANAHTAR KARELERİ --- */
        
        /* Çift vuruşlu (Lup-dup) kalp atışı efekti */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.35); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Yayılan ışık halkaları efekti */
        @keyframes pulse-ring {
            0% { width: 100px; height: 100px; opacity: 1; border-width: 5px; }
            100% { width: 700px; height: 700px; opacity: 0; border-width: 1px; }
        }

    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="heart-container">
        <div class="halo"></div>
        <div class="halo"></div>
        <div class="halo"></div>
        <div class="heart"></div>
    </div>

    <script>
        // Arka plandaki hareketli parçacıklar için JavaScript
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        // Ekran boyutunu ayarla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const numberOfParticles = 120; // Parçacık yoğunluğu

        // Parçacık oluşturucu
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.5,
                speed: Math.random() * 1.5 + 0.5,
                alpha: Math.random()
            });
        }

        // Animasyon döngüsü
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            // Arkada hafif bir iz bırakması için şeffaf siyah ile temizle
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff004f'; // Parçacık rengi (Kalp ile aynı)

            particlesArray.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                // Parçacıkları yukarı doğru hareket ettir
                p.y -= p.speed;
                
                // Ekrandan çıkan parçacığı en alta geri gönder
                if (p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
            });
        }
        
        animateParticles();

        // Pencere boyutu değiştiğinde canvası yeniden boyutlandır
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
